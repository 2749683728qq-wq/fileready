name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时自动部署
  push:
    branches: [main]
  # 支持手动触发
  workflow_dispatch:

# GitHub Pages 需要这个权限设置
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: 构建静态站点
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: "https://2749683728qq-wq.github.io"

      - name: 添加 .nojekyll 文件
        run: touch dist/.nojekyll

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
